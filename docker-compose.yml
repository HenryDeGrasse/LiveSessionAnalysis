services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LSA_CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - session-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

volumes:
  session-data:
