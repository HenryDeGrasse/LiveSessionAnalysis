app = "lsa-frontend"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

  # NEXT_PUBLIC_* variables must be present at Docker build time because Next.js
  # inlines them into the client bundle during `npm run build`.
  # Override these at deploy time with:
  #   fly deploy --build-arg NEXT_PUBLIC_API_URL=https://lsa-backend.fly.dev ...
  # Or set them here for a fixed deployment (do NOT put secrets/keys here).
  [build.args]
    NEXT_PUBLIC_API_URL = ""
    NEXT_PUBLIC_WS_URL = ""
    NEXT_PUBLIC_LIVEKIT_URL = ""
    NEXT_PUBLIC_GOOGLE_CLIENT_ID = ""
    NEXT_PUBLIC_SENTRY_DSN = ""
    NEXT_PUBLIC_SENTRY_ENVIRONMENT = "production"
    NEXT_PUBLIC_ENABLE_WEBRTC_CALL_UI = "true"
    NEXT_PUBLIC_LIVEKIT_VIDEO_CODEC = "vp8"
    NEXT_PUBLIC_LIVEKIT_VIDEO_MAX_BITRATE = "1200000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/"
    interval = "15s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
