# Deploy to Fly.io on push to main
#
# SETUP (one-time):
#   1. Go to GitHub repo → Settings → Secrets and variables → Actions
#   2. Add these repository secrets:
#
#      FLY_API_TOKEN                  — run `fly tokens create org personal` locally
#      NEXT_PUBLIC_API_URL            — https://lsa-backend.fly.dev
#      NEXT_PUBLIC_WS_URL             — wss://lsa-backend.fly.dev
#      NEXT_PUBLIC_LIVEKIT_URL        — wss://live-session-analysis-880s51x8.livekit.cloud
#      NEXT_PUBLIC_GOOGLE_CLIENT_ID   — your Google OAuth client ID
#
#   Optional secrets (leave empty to disable):
#      NEXT_PUBLIC_SENTRY_DSN
#      NEXT_PUBLIC_SENTRY_ENVIRONMENT

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:       # manual trigger from GitHub UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Tests — gate deployment on passing tests
  # ──────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run --reporter=verbose

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: |
          uv run --python 3.11 --with-requirements requirements.txt \
            pytest -x -v --tb=short \
            -m "not slow and not eval_replay and not browser_smoke and not soak_manual"

  # ──────────────────────────────────────────────────────────────
  # Deploy backend
  # ──────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app lsa-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Deploy frontend (with NEXT_PUBLIC_* build args)
  # ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy --app lsa-frontend \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            --build-arg NEXT_PUBLIC_WS_URL="${NEXT_PUBLIC_WS_URL}" \
            --build-arg NEXT_PUBLIC_LIVEKIT_URL="${NEXT_PUBLIC_LIVEKIT_URL}" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${NEXT_PUBLIC_GOOGLE_CLIENT_ID}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${NEXT_PUBLIC_SENTRY_DSN}" \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT="${NEXT_PUBLIC_SENTRY_ENVIRONMENT}" \
            --build-arg NEXT_PUBLIC_ENABLE_WEBRTC_CALL_UI="true" \
            --build-arg NEXT_PUBLIC_LIVEKIT_VIDEO_CODEC="vp8" \
            --build-arg NEXT_PUBLIC_LIVEKIT_VIDEO_MAX_BITRATE="1200000"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${{ secrets.NEXT_PUBLIC_SENTRY_ENVIRONMENT }}
